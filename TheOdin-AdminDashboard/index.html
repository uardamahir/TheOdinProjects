<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <div class="dashboard">
      <div class="d-item dashboard-title"><img src="icons/view-dashboard.svg" id="dashboard-m"/> Dashboard</div>

      <div class="d-item"><img src="icons/home.svg" id="home"/> Home</div>
      <div class="d-item"><img src="icons/card-account-details.svg" id="profile"/>Profile</div>
      <div class="d-item"><img src="icons/message-text.svg" id="messages"/>Messages</div>
      <div class="d-item"><img src="icons/clock-outline.svg" id="history"/>History</div>
      <div class="d-item"><img src="icons/note-multiple.svg" id="tasks"/>Tasks</div>
      <div class="d-item"><img src="icons/account-group.svg" id="communities"/>Communities</div>

      <div class="spacer"></div>

      <div class="d-item"><img src="icons/cog-box.svg" id="settings"/>Settings</div>
      <div class="d-item"><img src="icons/message-question.svg" id="support"/>Support</div>
      <div class="d-item"><img src="icons/shield-check.svg" id="privacy"/>Privacy</div>
    </div>
  

  <div class="main-content">
    <div class="top-bar">

  <!-- Üst Satır -->
  <div class="top-row">
    <div class="search-wrapper">
      <img src="icons/magnify.svg" class="search-icon">
      <input type="text" class="search">
    </div>

    <div class="top-user">
      <img src="icons/bell-ring-outline.svg" class="bell-icon">
      <img src="icons/user.jpg" class="user-avatar">
      <span class="user-name">Cool Monkey</span>
    </div>
  </div>
